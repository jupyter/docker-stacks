name: Merge single platform tags

env:
  REGISTRY: quay.io
  PUSH_TO_REGISTRY: ${{ (github.repository_owner == 'jupyter' || github.repository_owner == 'mathbunnyru') && (github.ref == 'refs/heads/main' || github.event_name == 'schedule') }}

on:
  workflow_call:
    inputs:
      image:
        description: Image name
        required: true
        type: string
      variant:
        description: Variant tag prefix
        required: true
        type: string
      timeout-minutes:
        description: Timeout in minutes
        default: 5
        type: number
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true

permissions: {}

jobs:
  tag-merge:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
      - name: Checkout Repo ⚡️
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create dev environment 📦
        uses: ./.github/actions/create-dev-env

      - name: Download aarch64 tags file 🏷
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aarch64-${{ inputs.variant }}-${{ inputs.image }}.txt
          path: /tmp/jupyter/tags/

      - name: Download x86_64 tags file 🏷
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: x86_64-${{ inputs.variant }}-${{ inputs.image }}.txt
          path: /tmp/jupyter/tags/

      - name: Login to Registry 🔐
        if: env.PUSH_TO_REGISTRY == 'true'
        run: |
          docker login ${{ env.REGISTRY }} \
            --username ${{ secrets.REGISTRY_USERNAME }} \
            --password ${{ secrets.REGISTRY_TOKEN }} || \
          (sleep 10 && \
          docker login ${{ env.REGISTRY }} \
            --username ${{ secrets.REGISTRY_USERNAME }} \
            --password ${{ secrets.REGISTRY_TOKEN }})
        shell: bash
        id: login

      - name: Merge tags for the images 🔀
        if: env.PUSH_TO_REGISTRY == 'true'
        run: |
          python3 -m tagging.apps.merge_tags \
            --image ${{ inputs.image }} \
            --variant ${{ inputs.variant }} \
            --tags-dir /tmp/jupyter/tags/
        shell: bash

      - name: Install Cosign 🔏
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image with Cosign 🔏
        if: env.PUSH_TO_REGISTRY == 'true'
        run: |
          IMAGE_DIGEST=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.image }} --verbose | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['Descriptor']['digest']) if isinstance(data, list) else print(data['Descriptor']['digest'])")
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.image }}@${IMAGE_DIGEST}
        shell: bash

      - name: Logout from Registry 🔐
        if: always() && env.PUSH_TO_REGISTRY == 'true' && steps.login.outcome == 'success'
        run: |
          docker logout ${{ env.REGISTRY }}
        shell: bash
